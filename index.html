<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ultra Notes</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
  overflow:hidden;
  transition:0.5s;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,0.4);
  border-radius:999px;
}

.glass{
  background:rgba(255,255,255,0.18);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 8px 30px rgba(0,0,0,0.1);
}

.noteCard{
  transition:0.25s;
}

.noteCard:hover{
  transform:translateY(-5px) scale(1.02);
}

.bouncy{
  transition:0.2s;
}

.bouncy:hover{
  transform:scale(1.08);
}

.bouncy:active{
  transform:scale(0.94);
}

.fadeIn{
  animation:fade 0.3s ease;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(12px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

textarea{
  caret-color:white;
}

</style>
</head>

<body class="text-white">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <div class="w-[380px] glass border-r border-white/10 flex flex-col">

    <!-- HEADER -->
    <div class="p-6 flex justify-between items-center border-b border-white/10">

      <div>
        <h1 class="text-4xl font-black tracking-tight">
          Ultra Notes ✨
        </h1>

        <p class="text-white/70">
          cute aesthetic notes app
        </p>
      </div>

      <button
        onclick="toggleSettings()"
        class="glass p-3 rounded-2xl bouncy text-xl"
      >
        ⚙️
      </button>

    </div>

    <!-- SETTINGS -->
    <div
      id="settingsPanel"
      class="hidden p-5 border-b border-white/10"
    >

      <h2 class="font-bold text-lg mb-4">
        Choose Background ✨
      </h2>

      <div class="flex gap-3 flex-wrap">

        <button
          onclick="setTheme('linear-gradient(135deg,#ff9a9e,#fad0c4)')"
          class="w-12 h-12 rounded-full bouncy"
          style="background:linear-gradient(135deg,#ff9a9e,#fad0c4)"
        ></button>

        <button
          onclick="setTheme('linear-gradient(135deg,#a18cd1,#fbc2eb)')"
          class="w-12 h-12 rounded-full bouncy"
          style="background:linear-gradient(135deg,#a18cd1,#fbc2eb)"
        ></button>

        <button
          onclick="setTheme('linear-gradient(135deg,#84fab0,#8fd3f4)')"
          class="w-12 h-12 rounded-full bouncy"
          style="background:linear-gradient(135deg,#84fab0,#8fd3f4)"
        ></button>

        <button
          onclick="setTheme('linear-gradient(135deg,#fccb90,#d57eeb)')"
          class="w-12 h-12 rounded-full bouncy"
          style="background:linear-gradient(135deg,#fccb90,#d57eeb)"
        ></button>

        <button
          onclick="setTheme('linear-gradient(135deg,#f6d365,#fda085)')"
          class="w-12 h-12 rounded-full bouncy"
          style="background:linear-gradient(135deg,#f6d365,#fda085)"
        ></button>

        <button
          onclick="setTheme('linear-gradient(135deg,#ffdde1,#ee9ca7)')"
          class="w-12 h-12 rounded-full bouncy"
          style="background:linear-gradient(135deg,#ffdde1,#ee9ca7)"
        ></button>

      </div>

    </div>

    <!-- SEARCH -->
    <div class="p-5">

      <input
        id="search"
        type="text"
        placeholder="Search notes..."
        oninput="renderNotes()"
        class="w-full p-4 rounded-3xl bg-white/20 outline-none placeholder-white/60"
      />

    </div>

    <!-- CREATE -->
    <div class="px-5">

      <button
        id="createBtn"
        class="w-full bg-white text-pink-500 hover:bg-pink-100 transition p-4 rounded-3xl font-black text-lg bouncy"
      >
        + Create New Note
      </button>

    </div>

    <!-- NOTES -->
    <div
      id="notesContainer"
      class="flex-1 overflow-y-auto p-5 space-y-4"
    ></div>

  </div>

  <!-- MAIN -->
  <div
    id="mainView"
    class="flex-1 flex items-center justify-center"
  >

    <div class="text-center fadeIn text-white/80">

      <div class="text-8xl">
        🌸
      </div>

      <h2 class="text-5xl font-black mt-6">
        No Note Selected
      </h2>

      <p class="mt-4 text-xl">
        Create a cute new note ✨
      </p>

    </div>

  </div>

</div>

<script>

let notes =
  JSON.parse(localStorage.getItem("ultraNotes")) || [];

let selectedNote = null;

function saveNotes(){

  localStorage.setItem(
    "ultraNotes",
    JSON.stringify(notes)
  );
}

function createNote(){

  const newNote = {
    id:Date.now(),
    title:"Untitled Note",
    content:"",
    starred:false,
    pinned:false,
    createdAt:new Date().toLocaleString()
  };

  notes.unshift(newNote);

  saveNotes();

  renderNotes();

  openNote(newNote.id);
}

document
  .getElementById("createBtn")
  .addEventListener("click",createNote);

function renderNotes(){

  const container =
    document.getElementById("notesContainer");

  const search =
    document.getElementById("search")
    .value
    .toLowerCase();

  let filtered = notes.filter(note=>

    note.title.toLowerCase().includes(search)
    ||
    note.content.toLowerCase().includes(search)

  );

  filtered.sort((a,b)=>
    a.title.localeCompare(b.title)
  );

  filtered.sort((a,b)=>
    b.pinned - a.pinned
  );

  container.innerHTML = "";

  filtered.forEach(note=>{

    const div =
      document.createElement("div");

    div.className =
      "glass rounded-[30px] p-5 cursor-pointer noteCard fadeIn";

    div.innerHTML = `

      <div class="flex justify-between items-start">

        <div>

          <h2 class="text-2xl font-black">
            ${note.title}
          </h2>

          <p class="text-white/60 text-sm mt-2">
            ${note.createdAt}
          </p>

        </div>

        <div class="flex gap-2">

          <button
            onclick="toggleStar(${note.id}); event.stopPropagation();"
            class="bouncy text-xl"
          >
            ${note.starred ? "⭐" : "☆"}
          </button>

          <button
            onclick="togglePin(${note.id}); event.stopPropagation();"
            class="bouncy text-xl"
          >
            ${note.pinned ? "📌" : "📍"}
          </button>

          <button
            onclick="deleteNote(${note.id}); event.stopPropagation();"
            class="bouncy text-xl"
          >
            🗑️
          </button>

        </div>

      </div>

      <p class="mt-4 text-pink-100 font-medium">
        Click to open note ✨
      </p>

    `;

    div.onclick = ()=>openNote(note.id);

    container.appendChild(div);

  });

}

function openNote(id){

  selectedNote =
    notes.find(n=>n.id===id);

  document.getElementById("mainView")
  .innerHTML = `

    <div class="w-full h-full p-10 overflow-y-auto fadeIn">

      <input
        id="editTitle"
        value="${selectedNote.title}"
        oninput="updateSelected()"
        class="w-full bg-transparent text-6xl font-black outline-none border-b border-white/20 pb-5 placeholder-white/50"
      />

      <textarea
        id="editContent"
        oninput="updateSelected()"
        placeholder="Start writing your thoughts..."
        class="w-full h-[70vh] bg-transparent outline-none text-2xl mt-10 resize-none placeholder-white/50"
      >${selectedNote.content}</textarea>

    </div>

  `;
}

function updateSelected(){

  if(!selectedNote) return;

  selectedNote.title =
    document.getElementById("editTitle").value;

  selectedNote.content =
    document.getElementById("editContent").value;

  notes = notes.map(n=>

    n.id===selectedNote.id
    ? selectedNote
    : n

  );

  saveNotes();

  renderNotes();
}

function deleteNote(id){

  notes =
    notes.filter(note=>note.id!==id);

  saveNotes();

  renderNotes();

  if(selectedNote?.id===id){

    document.getElementById("mainView")
    .innerHTML = `

      <div class="text-center fadeIn text-white/80">

        <div class="text-8xl">
          🌸
        </div>

        <h2 class="text-5xl font-black mt-6">
          No Note Selected
        </h2>

      </div>

    `;
  }
}

function toggleStar(id){

  notes = notes.map(note=>

    note.id===id
    ? {...note,starred:!note.starred}
    : note

  );

  saveNotes();

  renderNotes();
}

function togglePin(id){

  notes = notes.map(note=>

    note.id===id
    ? {...note,pinned:!note.pinned}
    : note

  );

  saveNotes();

  renderNotes();
}

function toggleSettings(){

  document
    .getElementById("settingsPanel")
    .classList.toggle("hidden");
}

function setTheme(color){

  document.body.style.background =
    color;

  document.body.style.backgroundAttachment =
    "fixed";
}

renderNotes();

</script>

</body>
</html>
