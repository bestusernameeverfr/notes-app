<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ultra Notes</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 999px;
    }

    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>

<body class="bg-black text-white overflow-hidden">

<div id="app" class="h-screen w-screen flex">

  <!-- SIDEBAR -->
  <div class="w-[400px] border-r border-white/10 flex flex-col bg-zinc-950">

    <!-- HEADER -->
    <div class="p-6 border-b border-white/10 flex items-center justify-between">
      <div>
        <h1 class="text-4xl font-black">Ultra Notes</h1>
        <p class="text-zinc-400">Future Notes App</p>
      </div>

      <button
        onclick="toggleTheme()"
        id="themeBtn"
        class="glass p-3 rounded-2xl hover:scale-110 transition"
      >
        🌙
      </button>
    </div>

    <!-- SEARCH -->
    <div class="p-5">
      <input
        id="search"
        oninput="renderNotes()"
        type="text"
        placeholder="Search notes..."
        class="w-full p-4 rounded-3xl bg-zinc-900 outline-none border border-white/10"
      />
    </div>

    <!-- CREATE NOTE -->
    <div class="px-5 pb-5 space-y-3">

      <input
        id="title"
        type="text"
        placeholder="Note title..."
        class="w-full p-4 rounded-3xl bg-zinc-900 outline-none border border-white/10"
      />

      <input
        id="tag"
        type="text"
        placeholder="Tag..."
        class="w-full p-4 rounded-3xl bg-zinc-900 outline-none border border-white/10"
      />

      <textarea
        id="content"
        placeholder="Write your note..."
        class="w-full h-32 p-4 rounded-3xl bg-zinc-900 outline-none border border-white/10 resize-none"
      ></textarea>

      <button
        onclick="createNote()"
        class="w-full bg-blue-600 hover:bg-blue-700 transition p-4 rounded-3xl font-bold"
      >
        + Create Note
      </button>

    </div>

    <!-- NOTES -->
    <div
      id="notesContainer"
      class="flex-1 overflow-y-auto px-5 pb-5 space-y-4"
    ></div>

  </div>

  <!-- MAIN -->
  <div class="flex-1 bg-gradient-to-br from-zinc-950 via-black to-zinc-900 overflow-y-auto">

    <div id="mainView" class="h-full flex items-center justify-center text-zinc-600">

      <div class="text-center">
        <div class="text-8xl">📝</div>
        <h2 class="text-5xl font-black mt-6">
          No Note Selected
        </h2>

        <p class="mt-3 text-xl">
          Create or open a note.
        </p>
      </div>

    </div>

  </div>

</div>

<script>

let notes = JSON.parse(localStorage.getItem("ultraNotes")) || [];
let selectedNote = null;
let darkMode = true;

function saveNotes() {
  localStorage.setItem("ultraNotes", JSON.stringify(notes));
}

function createNote() {

  const title = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();
  const tag = document.getElementById("tag").value.trim();

  if (!title) return;

  notes.push({
    id: Date.now(),
    title,
    content,
    tag,
    starred: false,
    pinned: false,
    createdAt: new Date().toLocaleString()
  });

  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
  document.getElementById("tag").value = "";

  saveNotes();
  renderNotes();
}

function renderNotes() {

  const container = document.getElementById("notesContainer");
  const search = document.getElementById("search").value.toLowerCase();

  let filtered = notes.filter(note =>
    note.title.toLowerCase().includes(search) ||
    note.content.toLowerCase().includes(search) ||
    note.tag.toLowerCase().includes(search)
  );

  // ALPHABETICAL SORT
  filtered.sort((a, b) => a.title.localeCompare(b.title));

  // PINNED FIRST
  filtered.sort((a, b) => b.pinned - a.pinned);

  container.innerHTML = "";

  filtered.forEach(note => {

    const div = document.createElement("div");

    div.className =
      "glass rounded-[30px] p-5 hover:scale-[1.02] transition cursor-pointer";

    div.innerHTML = `
      <div class="flex justify-between items-start">

        <div>
          <h2 class="text-2xl font-bold">${note.title}</h2>

          <p class="text-zinc-400 mt-1">
            #${note.tag || "general"}
          </p>
        </div>

        <div class="flex gap-2">

          <button onclick="toggleStar(${note.id}); event.stopPropagation();">
            ${note.starred ? "⭐" : "☆"}
          </button>

          <button onclick="togglePin(${note.id}); event.stopPropagation();">
            ${note.pinned ? "📌" : "📍"}
          </button>

          <button onclick="deleteNote(${note.id}); event.stopPropagation();">
            🗑️
          </button>

        </div>

      </div>

      <p class="mt-4 text-zinc-300 line-clamp-2">
        ${note.content}
      </p>

      <p class="text-xs text-zinc-500 mt-4">
        ${note.createdAt}
      </p>
    `;

    div.onclick = () => openNote(note.id);

    container.appendChild(div);
  });
}

function openNote(id) {

  selectedNote = notes.find(n => n.id === id);

  document.getElementById("mainView").innerHTML = `

    <div class="p-10">

      <input
        id="editTitle"
        value="${selectedNote.title}"
        oninput="updateSelected()"
        class="w-full bg-transparent text-6xl font-black outline-none border-b border-white/10 pb-5"
      />

      <div class="mt-5 text-zinc-400">
        #${selectedNote.tag || "general"}
      </div>

      <textarea
        id="editContent"
        oninput="updateSelected()"
        class="w-full h-[60vh] bg-transparent outline-none text-xl mt-8 resize-none"
      >${selectedNote.content}</textarea>

      <div class="mt-10 glass rounded-[35px] p-8">

        <h2 class="text-3xl font-black mb-5">
          Preview
        </h2>

        <div class="text-zinc-300 whitespace-pre-wrap">
          ${selectedNote.content}
        </div>

      </div>

    </div>

  `;
}

function updateSelected() {

  if (!selectedNote) return;

  selectedNote.title =
    document.getElementById("editTitle").value;

  selectedNote.content =
    document.getElementById("editContent").value;

  notes = notes.map(n =>
    n.id === selectedNote.id ? selectedNote : n
  );

  saveNotes();
  renderNotes();
}

function deleteNote(id) {

  notes = notes.filter(note => note.id !== id);

  if (selectedNote && selectedNote.id === id) {

    selectedNote = null;

    document.getElementById("mainView").innerHTML = `
      <div class="h-full flex items-center justify-center text-zinc-600">

        <div class="text-center">
          <div class="text-8xl">📝</div>

          <h2 class="text-5xl font-black mt-6">
            No Note Selected
          </h2>
        </div>

      </div>
    `;
  }

  saveNotes();
  renderNotes();
}

function toggleStar(id) {

  notes = notes.map(note =>
    note.id === id
      ? { ...note, starred: !note.starred }
      : note
  );

  saveNotes();
  renderNotes();
}

function togglePin(id) {

  notes = notes.map(note =>
    note.id === id
      ? { ...note, pinned: !note.pinned }
      : note
  );

  saveNotes();
  renderNotes();
}

function toggleTheme() {

  darkMode = !darkMode;

  if (darkMode) {
    document.body.className =
      "bg-black text-white overflow-hidden";

    document.getElementById("themeBtn").innerHTML = "🌙";
  }

  else {
    document.body.className =
      "bg-white text-black overflow-hidden";

    document.getElementById("themeBtn").innerHTML = "☀️";
  }
}

renderNotes();

</script>

</body>
</html>
