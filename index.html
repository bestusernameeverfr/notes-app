<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ultra Notes</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

* {
  -webkit-font-smoothing: antialiased;
  -webkit-text-stroke: 0.25px rgba(0,0,0,0.25);
  text-shadow: 0px 1px 2px rgba(0,0,0,0.25);
}

body{
  margin:0;
  overflow:hidden;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

/* animations */
.fadeIn{
  animation:fade 0.25s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.glass{
  background:rgba(255,255,255,0.18);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.2);
}

.noteCard{
  transition:0.2s;
}

.noteCard:hover{
  transform:scale(1.02);
}

button{
  transition:0.2s;
}

button:active{
  transform:scale(0.96);
}

/* layout states */
#sidebar{
  width:380px;
  height:100vh;
  position:absolute;
  left:0;
  top:0;
  overflow-y:auto;
  border-right:1px solid rgba(255,255,255,0.2);
}

#editor{
  display:none;
  height:100vh;
  width:100vw;
  padding:60px;
  box-sizing:border-box;
}

.fullscreen #sidebar{
  display:none;
}

.fullscreen #editor{
  display:block;
}

textarea,input{
  outline:none;
  border:none;
  background:transparent;
  width:100%;
  color:white;
}

</style>
</head>

<body class="text-white">

<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar" class="glass">

    <div class="p-6 border-b border-white/10 flex justify-between items-center">
      <h1 class="text-4xl font-black">Ultra Notes ✨</h1>
    </div>

    <div class="p-5">
      <button id="createBtn"
        class="w-full bg-white text-pink-500 p-4 rounded-3xl font-black">
        + Create New Note
      </button>
    </div>

    <div id="notesContainer" class="p-5 space-y-4"></div>

  </div>

  <!-- FULLSCREEN EDITOR -->
  <div id="editor" class="fadeIn">

    <input
      id="title"
      placeholder="Untitled Note"
      class="text-6xl font-black mb-10"
      oninput="updateNote()"
    />

    <textarea
      id="content"
      class="h-[75vh] text-2xl resize-none"
      oninput="updateNote()"
      placeholder="Start writing..."
    ></textarea>

  </div>

</div>

<script>

let notes = JSON.parse(localStorage.getItem("ultraNotes")) || [];
let selectedNote = null;

function saveNotes(){
  localStorage.setItem("ultraNotes", JSON.stringify(notes));
}

/* CREATE NOTE */
document.getElementById("createBtn").addEventListener("click", ()=>{
  const note = {
    id:Date.now(),
    title:"",
    content:"",
    updatedAt:Date.now()
  };

  notes.unshift(note);
  saveNotes();
  renderNotes();
  openNote(note.id);
});

/* RENDER SIDEBAR */
function renderNotes(){

  const container = document.getElementById("notesContainer");
  container.innerHTML = "";

  notes.forEach(note=>{

    const div = document.createElement("div");
    div.className = "glass p-5 rounded-3xl cursor-pointer noteCard fadeIn";

    div.innerHTML = `
      <div class="text-2xl font-black">
        ${note.title.trim() === "" ? "Untitled Note" : note.title}
      </div>
    `;

    div.onclick = ()=>openNote(note.id);

    container.appendChild(div);
  });
}

/* OPEN FULLSCREEN EDITOR */
function openNote(id){

  selectedNote = notes.find(n=>n.id===id);

  document.body.classList.add("fullscreen");

  document.getElementById("title").value = selectedNote.title;
  document.getElementById("content").value = selectedNote.content;

  document.getElementById("title").focus();
}

/* EXIT FULLSCREEN (ESC KEY) */
document.addEventListener("keydown",(e)=>{

  if(e.key === "Escape"){
    closeEditor();
  }
});

function closeEditor(){

  document.body.classList.remove("fullscreen");
  selectedNote = null;
  renderNotes();
}

/* UPDATE NOTE */
function updateNote(){

  if(!selectedNote) return;

  selectedNote.title =
    document.getElementById("title").value;

  selectedNote.content =
    document.getElementById("content").value;

  selectedNote.updatedAt = Date.now();

  notes = notes.map(n =>
    n.id === selectedNote.id ? selectedNote : n
  );

  saveNotes();
  renderNotes();
}

renderNotes();

</script>

</body>
</html>
