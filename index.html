<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ultra Notes</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
  overflow:hidden;
  transition:0.4s;
}

::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-thumb{
  background:#555;
  border-radius:999px;
}

.glass{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
}

.noteCard{
  transition:0.25s;
}

.noteCard:hover{
  transform:translateY(-4px) scale(1.02);
}

.bouncy{
  transition:0.2s;
}

.bouncy:hover{
  transform:scale(1.1);
}

.bouncy:active{
  transform:scale(0.95);
}

.fadeIn{
  animation:fade 0.3s ease;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

<body class="bg-zinc-950 text-white">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <div class="w-[380px] border-r border-white/10 flex flex-col">

    <!-- TOP -->
    <div class="p-6 border-b border-white/10 flex justify-between items-center">

      <div>
        <h1 class="text-4xl font-black tracking-tight">
          Ultra Notes
        </h1>

        <p class="text-zinc-400">
          futuristic notes app
        </p>
      </div>

      <button
        onclick="toggleSettings()"
        class="glass p-3 rounded-2xl bouncy text-xl"
      >
        ⚙️
      </button>

    </div>

    <!-- SETTINGS -->
    <div
      id="settingsPanel"
      class="hidden p-4 border-b border-white/10 space-y-3"
    >

      <h2 class="font-bold text-lg">
        Background Colors
      </h2>

      <div class="flex gap-3 flex-wrap">

        <button
          onclick="setTheme('#09090b')"
          class="w-10 h-10 rounded-full bg-zinc-950 border border-white/10 bouncy"
        ></button>

        <button
          onclick="setTheme('#0f172a')"
          class="w-10 h-10 rounded-full bg-slate-900 bouncy"
        ></button>

        <button
          onclick="setTheme('#1e1b4b')"
          class="w-10 h-10 rounded-full bg-indigo-950 bouncy"
        ></button>

        <button
          onclick="setTheme('#3f0d12')"
          class="w-10 h-10 rounded-full bg-red-950 bouncy"
        ></button>

        <button
          onclick="setTheme('#052e16')"
          class="w-10 h-10 rounded-full bg-green-950 bouncy"
        ></button>

      </div>

    </div>

    <!-- SEARCH -->
    <div class="p-5">

      <input
        id="search"
        type="text"
        placeholder="Search notes..."
        oninput="renderNotes()"
        class="w-full p-4 rounded-3xl bg-zinc-900 outline-none border border-white/10"
      />

    </div>

    <!-- CREATE -->
    <div class="px-5">

      <button
        id="createBtn"
        class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-3xl font-bold bouncy shadow-2xl"
      >
        + Create New Note
      </button>

    </div>

    <!-- NOTES -->
    <div
      id="notesContainer"
      class="flex-1 overflow-y-auto p-5 space-y-4"
    ></div>

  </div>

  <!-- MAIN -->
  <div
    id="mainView"
    class="flex-1 flex items-center justify-center text-zinc-600"
  >

    <div class="text-center fadeIn">

      <div class="text-8xl">
        📝
      </div>

      <h2 class="text-5xl font-black mt-6">
        No Note Selected
      </h2>

      <p class="mt-4 text-xl">
        Create a note to begin writing
      </p>

    </div>

  </div>

</div>

<script>

let notes =
  JSON.parse(localStorage.getItem("ultraNotes")) || [];

let selectedNote = null;

function saveNotes(){
  localStorage.setItem(
    "ultraNotes",
    JSON.stringify(notes)
  );
}

function createNote(){

  const newNote = {
    id:Date.now(),
    title:"Untitled Note",
    content:"",
    starred:false,
    pinned:false,
    createdAt:new Date().toLocaleString()
  };

  notes.unshift(newNote);

  saveNotes();

  renderNotes();

  openNote(newNote.id);
}

document
  .getElementById("createBtn")
  .addEventListener("click",createNote);

function renderNotes(){

  const container =
    document.getElementById("notesContainer");

  const search =
    document.getElementById("search")
    .value
    .toLowerCase();

  let filtered = notes.filter(note=>

    note.title.toLowerCase().includes(search)
    ||
    note.content.toLowerCase().includes(search)

  );

  filtered.sort((a,b)=>
    a.title.localeCompare(b.title)
  );

  filtered.sort((a,b)=>
    b.pinned - a.pinned
  );

  container.innerHTML = "";

  filtered.forEach(note=>{

    const div =
      document.createElement("div");

    div.className =
      "glass rounded-[30px] p-5 cursor-pointer noteCard fadeIn";

    div.innerHTML = `

      <div class="flex justify-between items-start">

        <div>

          <h2 class="text-2xl font-bold">
            ${note.title}
          </h2>

          <p class="text-zinc-500 text-sm mt-2">
            ${note.createdAt}
          </p>

        </div>

        <div class="flex gap-2">

          <button
            onclick="toggleStar(${note.id}); event.stopPropagation();"
            class="bouncy text-xl"
          >
            ${note.starred ? "⭐" : "☆"}
          </button>

          <button
            onclick="togglePin(${note.id}); event.stopPropagation();"
            class="bouncy text-xl"
          >
            ${note.pinned ? "📌" : "📍"}
          </button>

          <button
            onclick="deleteNote(${note.id}); event.stopPropagation();"
            class="bouncy text-xl"
          >
            🗑️
          </button>

        </div>

      </div>

      <p class="mt-4 text-zinc-300 line-clamp-2">
        ${note.content || "Empty note"}
      </p>

    `;

    div.onclick = ()=>openNote(note.id);

    container.appendChild(div);

  });

}

function openNote(id){

  selectedNote =
    notes.find(n=>n.id===id);

  document.getElementById("mainView")
  .innerHTML = `

    <div class="w-full h-full p-10 overflow-y-auto fadeIn">

      <input
        id="editTitle"
        value="${selectedNote.title}"
        oninput="updateSelected()"
        class="w-full bg-transparent text-6xl font-black outline-none border-b border-white/10 pb-5"
      />

      <textarea
        id="editContent"
        oninput="updateSelected()"
        placeholder="Start writing..."
        class="w-full h-[70vh] bg-transparent outline-none text-xl mt-10 resize-none"
      >${selectedNote.content}</textarea>

    </div>

  `;
}

function updateSelected(){

  if(!selectedNote) return;

  selectedNote.title =
    document.getElementById("editTitle").value;

  selectedNote.content =
    document.getElementById("editContent").value;

  notes = notes.map(n=>

    n.id===selectedNote.id
    ? selectedNote
    : n

  );

  saveNotes();

  renderNotes();
}

function deleteNote(id){

  notes =
    notes.filter(note=>note.id!==id);

  saveNotes();

  renderNotes();

  if(selectedNote?.id===id){

    document.getElementById("mainView")
    .innerHTML = `

      <div class="text-center fadeIn">

        <div class="text-8xl">
          📝
        </div>

        <h2 class="text-5xl font-black mt-6">
          No Note Selected
        </h2>

      </div>

    `;
  }
}

function toggleStar(id){

  notes = notes.map(note=>

    note.id===id
    ? {...note,starred:!note.starred}
    : note

  );

  saveNotes();

  renderNotes();
}

function togglePin(id){

  notes = notes.map(note=>

    note.id===id
    ? {...note,pinned:!note.pinned}
    : note

  );

  saveNotes();

  renderNotes();
}

function toggleSettings(){

  const panel =
    document.getElementById("settingsPanel");

  panel.classList.toggle("hidden");
}

function setTheme(color){

  document.body.style.background = color;
}

renderNotes();

</script>

</body>
</html>
