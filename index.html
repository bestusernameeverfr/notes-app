<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ultra Notes</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

* {
  -webkit-font-smoothing: antialiased;
  -webkit-text-stroke: 0.25px rgba(0,0,0,0.25);
  text-shadow: 0px 1px 2px rgba(0,0,0,0.25);
}

body{
  margin:0;
  overflow:hidden;
  transition:0.4s;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

#app{
  height:100vh;
  width:100vw;
  position:relative;
}

/* SIDEBAR */
#sidebar{
  width:380px;
  height:100vh;
  position:absolute;
  left:0;
  top:0;
  overflow-y:auto;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(18px);
  border-right:1px solid rgba(255,255,255,0.2);
}

/* EDITOR */
#editor{
  display:none;
  position:absolute;
  inset:0;
  padding:60px;
  box-sizing:border-box;
}

/* fullscreen */
.fullscreen #sidebar{ display:none; }
.fullscreen #editor{ display:block; }

.noteCard{
  transition:0.2s;
}

.noteCard:hover{
  transform:scale(1.02);
}

.fadeIn{
  animation:fade 0.25s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

button{ transition:0.2s; }
button:active{ transform:scale(0.96); }

textarea,input{
  outline:none;
  background:transparent;
  width:100%;
  color:white;
}

.glass{
  background:rgba(255,255,255,0.18);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.2);
}

#settingsPanel{
  display:none;
}

#settingsPanel.show{
  display:block;
}

</style>
</head>

<body class="text-white">

<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">

    <!-- HEADER -->
    <div class="p-6 border-b border-white/10 flex justify-between items-center">

      <h1 class="text-4xl font-black">Ultra Notes ✨</h1>

      <!-- SETTINGS BUTTON -->
      <button onclick="toggleSettings()"
        class="glass p-3 rounded-xl">
        ⚙️
      </button>

    </div>

    <!-- SETTINGS PANEL -->
    <div id="settingsPanel" class="p-5 border-b border-white/10">

      <p class="mb-3 font-bold">Backgrounds</p>

      <div class="flex gap-3 flex-wrap">

        <button onclick="setTheme('linear-gradient(135deg,#ff9a9e,#fad0c4)')"
          class="w-10 h-10 rounded-full"
          style="background:linear-gradient(135deg,#ff9a9e,#fad0c4)"></button>

        <button onclick="setTheme('linear-gradient(135deg,#a18cd1,#fbc2eb)')"
          class="w-10 h-10 rounded-full"
          style="background:linear-gradient(135deg,#a18cd1,#fbc2eb)"></button>

        <button onclick="setTheme('linear-gradient(135deg,#84fab0,#8fd3f4)')"
          class="w-10 h-10 rounded-full"
          style="background:linear-gradient(135deg,#84fab0,#8fd3f4)"></button>

        <button onclick="setTheme('linear-gradient(135deg,#fccb90,#d57eeb)')"
          class="w-10 h-10 rounded-full"
          style="background:linear-gradient(135deg,#fccb90,#d57eeb)"></button>

      </div>

    </div>

    <!-- CREATE -->
    <div class="p-5">
      <button id="createBtn"
        class="w-full bg-white text-pink-500 p-4 rounded-3xl font-black">
        + Create New Note
      </button>
    </div>

    <!-- NOTES -->
    <div id="notesContainer" class="p-5 space-y-4"></div>

  </div>

  <!-- EDITOR -->
  <div id="editor">

    <input id="title"
      placeholder="Untitled Note"
      class="text-6xl font-black mb-10"
      oninput="updateNote()" />

    <textarea id="content"
      class="h-[75vh] text-2xl resize-none"
      placeholder="Start writing..."
      oninput="updateNote()"></textarea>

  </div>

</div>

<script>

let notes = JSON.parse(localStorage.getItem("ultraNotes")) || [];
let selectedNote = null;

function saveNotes(){
  localStorage.setItem("ultraNotes", JSON.stringify(notes));
}

/* SETTINGS */
function toggleSettings(){
  document.getElementById("settingsPanel")
  .classList.toggle("show");
}

function setTheme(color){
  document.body.style.background = color;
}

/* CREATE */
document.getElementById("createBtn").onclick = ()=>{
  const note = {
    id:Date.now(),
    title:"",
    content:"",
    updatedAt:Date.now()
  };

  notes.unshift(note);
  saveNotes();
  renderNotes();
  openNote(note.id);
};

/* RENDER */
function renderNotes(){

  const container = document.getElementById("notesContainer");
  container.innerHTML = "";

  notes.forEach(note=>{

    const div = document.createElement("div");
    div.className = "glass p-5 rounded-3xl cursor-pointer noteCard fadeIn";

    div.innerHTML = `
      <div class="text-2xl font-black">
        ${note.title.trim() === "" ? "Untitled Note" : note.title}
      </div>
    `;

    div.onclick = ()=>openNote(note.id);

    container.appendChild(div);
  });
}

/* OPEN */
function openNote(id){

  selectedNote = notes.find(n=>n.id===id);

  document.body.classList.add("fullscreen");

  document.getElementById("title").value = selectedNote.title;
  document.getElementById("content").value = selectedNote.content;

  document.getElementById("title").focus();
}

/* ESC TO EXIT */
document.addEventListener("keydown",(e)=>{
  if(e.key === "Escape"){
    document.body.classList.remove("fullscreen");
    selectedNote = null;
    renderNotes();
  }
});

/* UPDATE */
function updateNote(){

  if(!selectedNote) return;

  selectedNote.title =
    document.getElementById("title").value;

  selectedNote.content =
    document.getElementById("content").value;

  selectedNote.updatedAt = Date.now();

  notes = notes.map(n =>
    n.id === selectedNote.id ? selectedNote : n
  );

  saveNotes();
  renderNotes();
}

renderNotes();

</script>

</body>
</html>
